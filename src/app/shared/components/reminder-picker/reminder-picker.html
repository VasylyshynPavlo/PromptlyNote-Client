<button
  type="button"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  class="flex items-center justify-center p-2 hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent rounded-md disabled:opacity-40 disabled:cursor-not-allowed"
  [disabled]="disabled()"
  [class]="value() !== null ? 'text-indigo-700 dark:text-indigo-300' : 'text-slate-900 dark:text-slate-100'"
  [title]="
    disabled() !== null
      ? 'Reminders are disabled for this task'
      : value() !== null
      ? 'Reminder set for ' + value() + ' minutes before'
      : 'No reminder set'  
  "
  [class]="disabled() !== null ? 'text-slate-500 dark:text-slate-400' : ''"
  (click)="toggle()"
>
  <span class="material-symbols-outlined" aria-hidden="true">
    {{ value() !== null ? 'notifications_active' : 'notifications' }}
  </span>
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="open()"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="close()"
  (detach)="close()"
>
  <div
    class="animate-pop-in origin-top w-64 rounded-md border border-white/10 bg-white/5 backdrop-blur-xl shadow-xl p-3 text-slate-900 dark:text-slate-100"
  >
    <label class="block text-sm font-medium mb-1">Set a reminder for (min)</label>
    <input
      type="number"
      min="1"
      [max]="max"
      step="1"
      inputmode="numeric"
      class="input-glass"
      [value]="draft()"
      (input)="draft.set($any($event.target).valueAsNumber || null)"
    />
    <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Maximum {{ max }} min (28 days).</p>

    <div class="mt-3 flex justify-between gap-2">
      <button
        type="button"
        class="input-glass-red disabled:opacity-40 disabled:cursor-not-allowed"
        [disabled]="value() === null"
        (click)="clear()"
      >
        Clear
      </button>
      <button
        type="button"
        class="input-glass disabled:opacity-40 disabled:cursor-not-allowed"
        [disabled]="draft() === null || $any(draft()) < 1 || $any(draft()) > max"
        (click)="set()"
      >
        Set
      </button>
    </div>
  </div>
</ng-template>
