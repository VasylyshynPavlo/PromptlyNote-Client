<div
  class="rounded-md bg-white/5 backdrop-blur-md shadow flex flex-col"
  [class.task-busy]="pending()"
  [attr.aria-busy]="pending()"
>
  <div class="flex gap-3 items-center">
    <button
      class="rounded-md flex items-center hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent p-2"
      (click)="toggleCompletion()"
    >
      <span class="material-symbols-outlined" aria-hidden="true">
        {{ task().isCompleted ? 'check_circle' : 'radio_button_unchecked' }}
      </span>
    </button>

    @if (editingName()) {
      <input
        #nameInput
        type="text"
        class="p-2 flex-1 bg-transparent focus:outline-none"
        aria-label="Task name"
        [value]="nameDraft()"
        (input)="nameDraft.set($any($event.target).value)"
        (keydown.enter)="saveName()"
        (keydown.escape)="cancelEditName()"
        (blur)="saveName()"
      />
    } @else {
      <button
        type="button"
        class="p-2 flex-1 text-left rounded-md hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent"
        title="Rename task"
        (click)="startEditName()"
      >
        <span [class.line-through]="task().isCompleted">{{ task().name }}</span>
      </button>
    }

    <div class="flex items-center gap-2">
      <app-reminder-picker
        [value]="task().remindBeforeMinutes"
        (changed)="onReminderChanged($event)"
        [hidden]="!userService.user()?.googleCalendar"
      />

      <button
        class="group flex items-center justify-center p-2 hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent rounded-md"
        (click)="toggleGoogleCalendar()"
        [class]="task().syncToGoogleCalendar ? 'text-indigo-700 dark:text-indigo-300' : ''"
        [hidden]="!userService.user()?.googleCalendar"
      >
        <span
          class="material-symbols-outlined"
          aria-hidden="true"
          [title]="
            task().syncToGoogleCalendar ? 'Remove from Google Calendar' : 'Add to Google Calendar'
          "
        >
          <span class="group-hover:hidden">
            {{ task().syncToGoogleCalendar ? 'calendar_check' : 'event_busy' }}
          </span>
          <span class="hidden group-hover:inline">
            {{ task().syncToGoogleCalendar ? 'event_busy' : 'calendar_add_on' }}
          </span>
        </span>
      </button>

      <app-steps-picker [value]="task().subTasks" (changed)="onStepsChanged($event)" />
      <app-note-picker [value]="task().note ?? ''" (changed)="onNoteChanged($event)" />
      <app-category-picker [selected]="task().category" (changed)="onCategoryChanged($event)" />
      <app-date-picker [value]="task().dueDate" (changed)="onDueChanged($event)" />

      <button
        type="button"
        class="flex items-center justify-center p-2 hover:border-red-500 border border-transparent rounded-md text-red-600 dark:text-red-400"
        title="Delete task"
        (click)="deleteTask()"
      >
        <span class="material-symbols-outlined" aria-hidden="true"> delete </span>
      </button>
    </div>
  </div>

  @if (task().subTasks.length > 0) {
    <div class="flex flex-col pl-10 pb-2">
      @for (subTask of task().subTasks; track subTask.id) {
        <div class="flex items-center gap-2">
          <button
            type="button"
            class="rounded-md flex items-center hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent p-1"
            [title]="subTask.isCompleted ? 'Mark step as not completed' : 'Mark step as completed'"
            (click)="toggleSubTaskCompletion($index)"
          >
            <span class="material-symbols-outlined" aria-hidden="true">
              {{ subTask.isCompleted ? 'check_circle' : 'radio_button_unchecked' }}
            </span>
          </button>
          <span
            class="p-1 text-sm text-slate-700 dark:text-slate-300"
            [class.line-through]="subTask.isCompleted"
          >
            {{ subTask.name }}
          </span>
        </div>
      }
    </div>
  }
</div>
