<button
  type="button"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  class="shrink-0 flex items-center gap-1 rounded-md px-2 py-2 text-sm hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent"
  [class]="value() ? 'text-indigo-700 dark:text-indigo-300' : ''"
  [title]="value() ? 'Change due date' : 'Set a due date'"
  (click)="toggle()"
>
  <span class="material-symbols-outlined" aria-hidden="true"> event </span>
  @if (value()) {
    <span>{{ value() | localDate: 'short' }}</span>
  }
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="open()"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="close()"
  (detach)="close()"
>
  <div
    class="animate-pop-in origin-top w-72 rounded-md border border-white/10 bg-white/5 backdrop-blur-xl shadow-xl p-3 text-slate-900 dark:text-slate-100"
  >
    <div class="flex items-center justify-between mb-2">
      <button
        type="button"
        class="flex items-center p-1 rounded-md hover:bg-white/10"
        aria-label="Previous month"
        (click)="prevMonth()"
      >
        <span class="material-symbols-outlined" aria-hidden="true"> chevron_left </span>
      </button>
      <span class="text-sm font-medium capitalize">{{ monthLabel() }}</span>
      <button
        type="button"
        class="flex items-center p-1 rounded-md hover:bg-white/10"
        aria-label="Next month"
        (click)="nextMonth()"
      >
        <span class="material-symbols-outlined" aria-hidden="true"> chevron_right </span>
      </button>
    </div>

    <div class="grid grid-cols-7 gap-1 mb-1 text-center text-xs text-slate-500 dark:text-slate-400">
      @for (weekday of weekdays; track weekday) {
        <span>{{ weekday }}</span>
      }
    </div>

    <div class="grid grid-cols-7 gap-1">
      @for (day of days(); track day.getTime()) {
        <button
          type="button"
          class="h-8 w-8 rounded-md text-sm flex items-center justify-center hover:bg-white/10"
          [class.opacity-40]="!inMonth(day)"
          [class.ring-1]="isToday(day)"
          [class.ring-indigo-400]="isToday(day)"
          [class.bg-indigo-600]="isSelected(day)"
          [class.text-white]="isSelected(day)"
          (click)="selectDay(day)"
        >
          {{ day.getDate() }}
        </button>
      }
    </div>

    <div class="mt-3 flex items-center gap-2">
      <span class="material-symbols-outlined text-slate-500 dark:text-slate-400" aria-hidden="true">
        schedule
      </span>
      <input
        type="time"
        class="input-glass"
        aria-label="Time"
        [value]="time()"
        (input)="setTime($any($event.target).value)"
      />
    </div>

    <div class="mt-3 flex justify-between gap-2">
      <button
        type="button"
        class="input-glass-red disabled:opacity-40 disabled:cursor-not-allowed"
        [disabled]="value() === null"
        (click)="clear()"
      >
        Clear
      </button>
      <button
        type="button"
        class="input-glass disabled:opacity-40 disabled:cursor-not-allowed"
        [disabled]="draft() === null"
        (click)="set()"
      >
        Set
      </button>
    </div>
  </div>
</ng-template>
