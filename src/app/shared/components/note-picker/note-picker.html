<button
  type="button"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  class="flex items-center justify-center p-2 hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent rounded-md"
  [class]="value() ? 'text-indigo-700 dark:text-indigo-300' : ''"
  [title]="value() ? 'Edit note' : 'Add a note'"
  (click)="toggle()"
>
  <span class="material-symbols-outlined" aria-hidden="true">
    {{ value() ? 'note' : 'note_add' }}
  </span>
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="open()"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="close()"
  (detach)="close()"
>
  <div
    class="animate-pop-in origin-top w-72 rounded-md border border-white/10 bg-white/5 backdrop-blur-xl shadow-xl p-3 text-slate-900 dark:text-slate-100"
  >
    <label class="block text-sm font-medium mb-1">Note</label>
    <textarea
      rows="4"
      [attr.maxlength]="maxLength"
      placeholder="Write a note…"
      class="input-glass resize-none"
      [value]="draft()"
      (input)="draft.set($any($event.target).value)"
    ></textarea>
    <p class="mt-1 text-xs text-slate-500 dark:text-slate-400 text-right">
      {{ draft().length }}/{{ maxLength }}
    </p>

    <div class="mt-3 flex justify-between gap-2">
      <button
        type="button"
        class="input-glass-red disabled:opacity-40 disabled:cursor-not-allowed"
        [disabled]="!value()"
        (click)="clear()"
      >
        Clear
      </button>
      <button type="button" class="input-glass" (click)="set()">Set</button>
    </div>
  </div>
</ng-template>
