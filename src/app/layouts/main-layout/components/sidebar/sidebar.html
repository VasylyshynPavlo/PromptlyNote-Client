<aside>
  @if (taskListService.loading()) {
    <p>Loading...</p>
  } @else {
    @if (taskListService.taskLists().length === 0) {
      <p>No task lists available.</p>
    } @else {
      <ul class="flex flex-col gap-2 p-2">
        @for (list of taskListService.taskLists(); track list.id) {
          <a
            class="p-2 bg-white/1 rounded-md hover:rounded-r-3xl transition-all duration-300 border border-transparent hover:border-indigo-700 dark:hover:border-indigo-300 items-center flex gap-3 cursor-pointer select-none"
          >
            <span class="material-symbols-outlined">
              {{ list.iconName | icon }}
            </span>
            {{ list.name }}
          </a>
        }
      </ul>
    }
  }
</aside>
