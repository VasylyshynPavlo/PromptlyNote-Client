<div
  class="h-screen w-screen overflow-hidden flex flex-col bg-slate-100 dark:bg-slate-950 dark:text-slate-100 text-slate-900"
>
  <div class="fixed inset-0 pointer-events-none" aria-hidden="true">
    <div
      class="absolute top-[6%] left-[8%] w-116 h-116 bg-indigo-400/30 rounded-full blur-3xl animate-blob-1"
    ></div>
    <div
      class="absolute top-[-4%] left-[38%] w-100 h-100 bg-violet-400/20 rounded-full blur-3xl animate-blob-2 [animation-delay:-6s]"
    ></div>
    <div
      class="absolute top-[8%] right-[6%] w-116 h-116 bg-rose-300/20 rounded-full blur-3xl animate-blob-3 [animation-delay:-3s]"
    ></div>
    <div
      class="absolute bottom-[8%] left-[6%] w-92 h-92 bg-sky-300/20 rounded-full blur-3xl animate-blob-4 [animation-delay:-12s]"
    ></div>
    <div
      class="absolute bottom-[-6%] left-[40%] w-100 h-100 bg-fuchsia-300/15 rounded-full blur-3xl animate-blob-5 [animation-delay:-9s]"
    ></div>
    <div
      class="absolute bottom-[6%] right-[8%] w-116 h-116 bg-indigo-300/15 rounded-full blur-3xl animate-blob-6 [animation-delay:-18s]"
    ></div>
  </div>

  <nav class="flex p-3 justify-between items-center bg-white/5 backdrop-blur-lg shadow-xl" aria-label="Main navigation">
      <a class="font-bold" routerLink="/">PromptlyNote</a>
      Search placeholder
      <button
        class="input-glass px-3 py-1 rounded-lg text-sm font-medium w-20 text-slate-700 dark:text-slate-200 hover:bg-slate-900/5 dark:hover:bg-white/10 transition-colors"
        (click)="logout()"
      >
        Logout
      </button>
  </nav>

  <div class="relative z-10 flex flex-1 min-h-0">
    <app-sidebar class="w-2xs flex flex-col bg-white/5 backdrop-blur-lg shadow-xl"/>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <main class="flex-1 h-full">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
