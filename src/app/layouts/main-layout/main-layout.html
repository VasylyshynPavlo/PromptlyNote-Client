<div
  class="h-screen w-screen overflow-hidden flex flex-col bg-slate-100 dark:bg-slate-950 dark:text-slate-100 text-slate-900"
>
  <div class="fixed inset-0 pointer-events-none" aria-hidden="true">
    <div
      class="absolute top-[6%] left-[8%] w-116 h-116 bg-indigo-400/30 rounded-full blur-3xl animate-blob-1"
    ></div>
    <div
      class="absolute top-[-4%] left-[38%] w-100 h-100 bg-violet-400/20 rounded-full blur-3xl animate-blob-2 [animation-delay:-6s]"
    ></div>
    <div
      class="absolute top-[8%] right-[6%] w-116 h-116 bg-rose-300/20 rounded-full blur-3xl animate-blob-3 [animation-delay:-3s]"
    ></div>
    <div
      class="absolute bottom-[8%] left-[6%] w-92 h-92 bg-sky-300/20 rounded-full blur-3xl animate-blob-4 [animation-delay:-12s]"
    ></div>
    <div
      class="absolute bottom-[-6%] left-[40%] w-100 h-100 bg-fuchsia-300/15 rounded-full blur-3xl animate-blob-5 [animation-delay:-9s]"
    ></div>
    <div
      class="absolute bottom-[6%] right-[8%] w-116 h-116 bg-indigo-300/15 rounded-full blur-3xl animate-blob-6 [animation-delay:-18s]"
    ></div>
  </div>

  <nav
    class="flex p-3 justify-between items-center bg-white/5 backdrop-blur-lg shadow-xl"
    aria-label="Main navigation"
  >
    <div class="flex gap-2 items-center">
      @if (isNarrow()) {
        <button
          type="button"
          class="flex items-center rounded-md p-1 border border-transparent hover:border-indigo-700 dark:hover:border-indigo-300 transition-colors"
          aria-label="Open task lists"
          aria-haspopup="dialog"
          [attr.aria-expanded]="sidebarOpen()"
          (click)="toggleSidebar()"
        >
          <span class="material-symbols-outlined" aria-hidden="true">menu</span>
        </button>
      }
      <a class="font-bold" routerLink="/">PromptlyNote</a>
    </div>
    Search placeholder
    <div class="flex gap-3 items-center">
      <app-user-profile />
    </div>
  </nav>

  <div class="relative z-10 flex flex-1 min-h-0">
    @if (!isNarrow()) {
      <ng-container [ngTemplateOutlet]="sidebarPanel" />
    }

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <main class="flex-1 h-full">
        <router-outlet />
      </main>
    </div>
  </div>
</div>

<ng-template #sidebarPanel>
  <app-sidebar
    class="w-2xs h-full flex flex-col overflow-y-auto bg-white/5 backdrop-blur-lg shadow-xl"
  />
</ng-template>

<ng-template #sidebarDrawer>
  <div
    class="animate-slide-in-left h-full flex"
    role="dialog"
    aria-modal="true"
    aria-label="Task lists"
    cdkTrapFocus
    [cdkTrapFocusAutoCapture]="true"
  >
    <ng-container [ngTemplateOutlet]="sidebarPanel" />
  </div>
</ng-template>
