<form class="flex flex-col gap-3 w-full" (ngSubmit)="onSubmit()">
  @if (errors().general; as msg) {
    <p role="alert" class="text-sm text-red-500 text-center">{{ msg }}</p>
  }
  <!-- Name -->
  <div
    class="grid transition-all duration-300 ease-out"
    [class]="isRegistering() ? 'grid-rows-[1fr]' : 'grid-rows-[0fr]'"
    [class.opacity-0]="!isRegistering()"
  >
    <div class="min-h-0" [class.overflow-hidden]="!isRegistering()">
      <div class="group relative">
        <input
          type="text"
          name="name"
          autocomplete="name"
          placeholder="Name"
          [ngModel]="name()"
          (ngModelChange)="name.set($event)"
          [attr.tabindex]="isRegistering() ? null : -1"
          class="input-glass"
        />
        @if (errors().fields.name; as err) {
          <p id="name-err" class="text-sm text-red-500 mt-1">{{ err }}</p>
        }
      </div>
    </div>
  </div>

  <!-- Email -->
  <div class="group relative">
    <input
      type="email"
      name="email"
      autocomplete="email"
      placeholder="Email"
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      class="input-glass"
    />
    @if (errors().fields.email; as err) {
      <p id="email-err" class="text-sm text-red-500 mt-1">{{ err }}</p>
    }
  </div>

  <!-- Password -->
  <div class="group relative">
    <input
      type="password"
      name="password"
      [attr.autocomplete]="isRegistering() ? 'new-password' : 'current-password'"
      placeholder="Password"
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      class="input-glass"
    />
    @if (errors().fields.password; as err) {
      <p id="password-err" class="text-sm text-red-500 mt-1">{{ err }}</p>
    }
    <!-- Кнопка показати/сховати -->
    <!-- <button
      type="button"
      (click)="togglePassword()"
      [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-lg dark:text-slate-400 text-slate-600 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-900/5 dark:hover:bg-white/10 transition-colors"
    >
      @if (showPassword()) {
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      } @else {
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 8 10 8a13.16 13.16 0 0 1-1.67 2.68" />
          <path d="M6.61 6.61A13.5 13.5 0 0 0 2 12s3.5 8 10 8a9.74 9.74 0 0 0 5.39-1.61" />
          <path d="M2 2l20 20" />
          <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
        </svg>
      }
    </button> -->
    <a
      href="#"
      class="self-end text-xs font-medium text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 transition-colors"
    >
      Forgot password?
    </a>
  </div>

  <div class="group relative w-full">
    <button
      type="submit"
      class="input-glass w-full font-semibold tracking-wide text-gray-700 dark:text-white text-sm sm:text-base grid place-items-center"
    >
      <span
        class="col-start-1 row-start-1 transition-all duration-300"
        [class]="isRegistering() ? 'opacity-100 blur-none' : 'opacity-0 blur-sm -translate-y-1'"
      >
        Register
      </span>
      <span
        class="col-start-1 row-start-1 transition-all duration-300"
        [class]="isRegistering() ? 'opacity-0 blur-sm translate-y-1' : 'opacity-100 blur-none'"
      >
        Log In
      </span>
    </button>
  </div>

  <div class="flex items-center justify-center gap-2">
    <span class="text-sm text-slate-500 dark:text-slate-400 grid">
      <span
        class="col-start-1 row-start-1 text-center transition-all duration-300"
        [class]="isRegistering() ? 'opacity-100' : 'opacity-0'"
      >
        Already have an account?
      </span>
      <span
        class="col-start-1 row-start-1 text-center transition-all duration-300"
        [class]="isRegistering() ? 'opacity-0' : 'opacity-100'"
      >
        Don't have an account?
      </span>
    </span>

    <button
      type="button"
      (click)="isRegistering.set(!isRegistering())"
      class="text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:underline grid"
    >
      <span
        class="col-start-1 row-start-1 transition-all duration-300"
        [class]="isRegistering() ? 'opacity-100' : 'opacity-0'"
      >
        Log In
      </span>
      <span
        class="col-start-1 row-start-1 transition-all duration-300"
        [class]="isRegistering() ? 'opacity-0' : 'opacity-100'"
      >
        Register
      </span>
    </button>
  </div>
</form>
