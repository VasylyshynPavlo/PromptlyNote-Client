<form class="flex flex-col">
  <div class="w-full flex items-center gap-3">
    <button
      class="rounded-l-md flex items-center hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent p-2"
    >
      <span class="material-symbols-outlined" aria-hidden="true"> add </span>
    </button>
    <input
      type="text"
      placeholder="Add a new task"
      class="flex-1 p-2 rounded-r-md bg-transparent focus:outline-none"
    />
  </div>
  <div class="flex">
    <button
      class="rounded-md flex gap-2 items-center hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent p-2"
    >
      <span class="material-symbols-outlined" aria-hidden="true"> add_alert </span>
      <span class="text-sm">Set Reminder</span>
    </button>
    <button
      class="rounded-md flex gap-2 items-center hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent p-2"
    >
      <span class="material-symbols-outlined" aria-hidden="true"> calendar_add_on </span>
      <span class="text-sm">Add to Google Calendar</span>
    </button>
    <button
      class="rounded-md flex gap-2 items-center hover:border-indigo-700 dark:hover:border-indigo-300 border border-transparent p-2"
    >
      <span class="material-symbols-outlined" aria-hidden="true"> list_alt_add </span>
      <span class="text-sm">Add steps</span>
    </button>
  </div>
</form>
